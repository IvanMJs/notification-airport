<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#09090f"/>

  <!-- Subtle radial glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
    <stop offset="100%" stop-color="#09090f" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Airplane icon -->
  <text
    x="600"
    y="260"
    font-family="Arial, sans-serif"
    font-size="140"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#f59e0b"
  >✈</text>

  <!-- TripCopilot wordmark -->
  <text
    x="600"
    y="370"
    font-family="Arial Black, Arial, sans-serif"
    font-size="72"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#ffffff"
    letter-spacing="-2"
  >TripCopilot</text>

  <!-- Tagline -->
  <text
    x="600"
    y="440"
    font-family="Arial, sans-serif"
    font-size="28"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#6b7280"
    letter-spacing="0.5"
  >Monitoreo de vuelos en tiempo real</text>
</svg>
